name: Pull Request
on:
  pull_request:
    paths-ignore:
      - "**.md"
      - ".github/workflows/actionlint.yaml"
  workflow_dispatch: {}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25'

    - name: Lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
      with:
        version: v2.7

    - name: Validate
      run: ./scripts/validate
      env:
        SKIP_LINT: "true"

  build:
    name: Build
    needs: validate
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Build Dockerfile - binary
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        context: .
        file: ./Dockerfile
        provenance: mode=min
        target: binary
        outputs: type=local,dest=.
        build-args: |
          ARCH=${{ matrix.arch }}

    - name: Build Dockerfile - package
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        context: .
        file: ./Dockerfile
        provenance: false
        target: package
        tags: rancher/kine:latest
        outputs: type=docker,dest=${{ runner.temp }}/kine.tar
        build-args: |
          ARCH=${{ matrix.arch }}

    - name: Build Dockerfile.test
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
      with:
        context: .
        file: ./Dockerfile.test
        provenance: false
        tags: rancher/kine-test:latest
        outputs: type=docker,dest=${{ runner.temp }}/kine-test.tar
        build-args: |
          ARCH=${{ matrix.arch }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: images-${{ matrix.arch }}
        path: ${{ runner.temp }}/kine*.tar
        if-no-files-found: error
        retention-days: 1

  docker:
    name: Docker
    needs: build
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        test: [sqlite, litestream, mysql, postgres, cockroachdb, surrealdb, schema-migration, nats, nats-embedded, nats-socket]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: images-${{ matrix.arch }}
        path: ${{ runner.temp }}

    - name: Load Images
      run: |
        docker load --input ${{ runner.temp }}/kine.tar
        docker load --input ${{ runner.temp }}/kine-test.tar

    - name: Run Test
      run: |
        docker run --name run-test-${{ matrix.test }} --rm -v /var/run/docker.sock:/var/run/docker.sock -e TAG=latest rancher/kine-test:latest scripts/test ${{ matrix.test }}
